name: Update Combined Economist RSS

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests playwright

      - name: Install Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Install BotBrowser & Profile
        run: |
          # 1. Fetch Release Info (No Auth Header for Public Repo)
          echo "Fetching latest BotBrowser release info..."
          RELEASE_JSON=$(curl -s https://api.github.com/repos/MiddleSchoolStudent/BotBrowser/releases/latest)
          
          if echo "$RELEASE_JSON" | grep -q "message"; then
            echo "❌ GitHub API Error: $(echo "$RELEASE_JSON" | jq -r '.message')"
            exit 1
          fi

          # 2. Extract and Download .deb
          DEB_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | endswith(".deb")) | select(.name | contains("amd64") or contains("x64")) | .browser_download_url' | head -n 1)
          
          if [ -z "$DEB_URL" ] || [ "$DEB_URL" = "null" ]; then
            echo "❌ Error: Could not find compatible .deb asset."
            exit 1
          fi
          
          echo "Downloading BotBrowser: $DEB_URL"
          curl -L "$DEB_URL" -o botbrowser.deb
          sudo dpkg -i botbrowser.deb || sudo apt-get install -f -y

          # 3. Locate Binary and set PATH
          BB_BIN=""
          for candidate in /usr/bin/botbrowser /opt/botbrowser/botbrowser /usr/bin/chromium-browser-stable /usr/bin/chromium-browser; do
            if [ -x "$candidate" ]; then
              BB_BIN="$candidate"
              break
            fi
          done
          
          if [ -z "$BB_BIN" ]; then
            echo "❌ Error: Binary not found."
            exit 1
          fi
          
          echo "BotBrowser installed at: $BB_BIN"
          echo "BOTBROWSER_PATH=$BB_BIN" >> $GITHUB_ENV

          # 4. Extract and Download Profile
          PROFILE_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | endswith(".zip")) | select(.name | contains("profile")) | .browser_download_url' | head -n 1)
          
          if [ -n "$PROFILE_URL" ] && [ "$PROFILE_URL" != "null" ]; then
            echo "Downloading Profile: $PROFILE_URL"
            curl -L "$PROFILE_URL" -o profile.zip
            unzip -o profile.zip
            PROFILE_FILE=$(find . -maxdepth 1 -name "*.enc" | head -n 1)
            if [ -n "$PROFILE_FILE" ]; then
               echo "BOTBROWSER_PROFILE=$(realpath "$PROFILE_FILE")" >> $GITHUB_ENV
            fi
          fi

      - name: Run Scraper
        env:
          BOTBROWSER_CDP_PORT: "9222"
          PYTHONUNBUFFERED: "1"
        run: |
          timeout 1800 python lau.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add combined.xml
          git add debug_*.html 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update combined Economist RSS [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
            git push
          fi

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            debug_*.html
            *.log
          retention-days: 3
